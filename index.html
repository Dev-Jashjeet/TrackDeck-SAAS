<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrackDeck</title>
  <link rel="shortcut icon" href="logo.png" type="image/x-icon">
  <link rel="stylesheet" href="login.css" />
</head>
<body onload="refreshLoader()">
  <!-- Loader Container -->
    <div id="loadingScreen">
        <div class="loader" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

  <div class="login-container">

    <div class="login-card">
      <h2>Welcome Back</h2>
      <p class="subtitle">Login to your dashboard</p>

      <form id="loginForm">

        <div class="input-group">
          <label>Email</label>
          <input type="email" placeholder="Enter your email" class="email" required/>
        </div>

        <div class="input-group">
          <label>Password</label>
          <input type="password" placeholder="Enter your password" class="password" required/>
        </div>

        <button type="button" class="login-btn">Login</button>

      </form>

      <p class="footer-text">© 2026 TrackDeck</p>
    </div>

  </div>

</body>
<script src="login.js"></script>
</html>

<!-- Done and Dusted -->
